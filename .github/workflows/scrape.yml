name: Auto Scrape Exams

on:
  schedule:
    - cron: '0 6 * * *'  # Her gün 06:00 UTC (09:00 TR)
  workflow_dispatch:  # Manuel tetikleme

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run auto scraper
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python auto_scraper.py

      - name: Purge jsDelivr cache
        if: success()
        run: |
          curl -s https://purge.jsdelivr.net/gh/Aliozt01/ehliyet-data@main/version.json || true
          curl -s https://purge.jsdelivr.net/gh/Aliozt01/ehliyet-data@main/exam_data.json || true
