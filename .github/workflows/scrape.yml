name: Auto Scrape Exams
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - run: python auto_scraper.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
